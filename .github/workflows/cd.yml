name: CD Pipeline

# -----------------------------------------------------------------------------
# GitHub Repository Secrets Required for Deployment:
# 
# To make this CI/CD pipeline work, you must add the following secrets to 
# your GitHub Repository (Settings -> Secrets and variables -> Actions):
# 
# 1. RAILWAY_TOKEN: Your Railway project's deploy token (from railway.app)
#
# Production environment variables like ANTHROPIC_API_KEY, DATABASE_URL,
# and SLACK_WEBHOOK_URL should be set directly in the Railway dashboard.
# -----------------------------------------------------------------------------

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
