server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files, fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend service
    location /api/ {
        # Strip the /api prefix before sending to backend if backend doesn't expect it
        # Wait, the FastAPI code includes prefix=/tickets, etc., but NO /api prefix globally!
        # The prompt says "Configure the /api location block to proxy requests to the backend container at http://backend:8000"
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
